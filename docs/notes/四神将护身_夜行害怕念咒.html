咒，青龙居我左，拇指点食指中节</p>
<p>白虎是侍我右拇指点无名指中间</p>
<p>朱雀护我前拇指点中指顶节</p>
<p>玄武立我后拇指点中指底节</p>
<p>四方四神将拇指点中指中节</p>
<p>将我元神护拇指点无名指指根</p>
<p>吾奉太上老君急急如律令</p>
<p>边念咒边点念到急急如律令后，四指迅速握住大拇指即可，此法随时可以用作护身</p>
