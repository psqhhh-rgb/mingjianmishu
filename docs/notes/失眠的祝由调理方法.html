    <div class="article-meta"></div>
    <p>睡前念</p>
<p>右手剑指往左手心写，夜猫子</p>
<p>写三遍到七遍</p>
<p>然后左手心放在额头</p>
<p>右手剑指放在胸前</p>
<p>念咒语</p>
<p>日落西山神入心房，血气和通病无自生，丹元心神，守卫黄房，一觉睡到神清气爽，吾奉太上老君急急如律令</p>
<p>不停的念</p>
