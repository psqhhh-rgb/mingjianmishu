    <h1 class="article-title">要想脑海里出画面，先练大脑屏</h1>
    <div class="article-meta"></div>
    <p>要想脑海里出画面，先练大脑屏<br />
大脑屏是国家科委老师傅们教的<br />
当时就说了一句话，<br />
观想大脑横切面，是一个平静的大海面<br />
只说了这一句<br />
就用这一句话去练<br />
现在我发现，学生们也好问，不过越解释越迷惑<br />
只管去观想这一个画面，<br />
很快画面就变海面上出现景象<br />
拉手拉出能量来，去练大脑屏<br />
我说了，就每天去练，几天就成功了<br />
不要我说一次，做一遍，不说，就忘了<br />
邵康节，能看到一把椅子，被几年后，叫什么名字的人所毁<br />
竟然能清晰的看到名字，长相</p>
