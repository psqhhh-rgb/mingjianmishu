    <h1 class="article-title">七田真的秘诀就在平行眼</h1>
    <div class="article-meta"></div>
    <p>前几天，有个朋友说，七田真的秘诀就在平行眼</p>
<p>练成了，看一页书，立体高清，小化呈现在眼前，不就一眼看全一页纸了吗</p>
<p>太奇妙了，越远画面越小</p>
<p>飘在原来页面上面，还会活动</p>
<p>人外有人，天外有天</p>
<p>把这个活动的页面打到墙上</p>
<p>怪不得觉得杨龙讲的跟吕祖有关，正在直播，正好说到吕祖修炼法</p>
<p>原来如此</p>
<p><img alt="59861632c778bd8ab6a73d3f7479364d.jpg" src="../assets/59861632c778bd8ab6a73d3f7479364d.jpg" /></p>
<p>这幅图，用三D眼看</p>
<p>图上飘出一张立体小图来</p>
<p>一眼就能看全图片</p>
<p>也可以脑屏里先完成，还可以白墙壁投屏看</p>
<p>一目十行的基础</p>
